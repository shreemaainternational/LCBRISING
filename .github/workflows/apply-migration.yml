name: Apply database migration (one-shot)

# Manually-triggered workflow that runs supabase/apply_to_production.sql
# against the LCBRising production Supabase project via the official
# Management API (https://api.supabase.com/v1/projects/{ref}/database/query).
#
# Required GitHub repo secret:
#   SUPABASE_ACCESS_TOKEN  - Personal Access Token, sbp_*  (Supabase Dashboard
#                            -> Account -> Tokens). Must belong to the
#                            account that owns the LCBRISING organization.
#
# Run: GitHub repo -> Actions -> "Apply database migration (one-shot)"
#      -> Run workflow -> branch: main -> input: sql_path / project_ref
#      / admin_email (all optional) -> Run.

on:
  workflow_dispatch:
    inputs:
      sql_path:
        description: 'Path of the SQL file to apply (relative to repo root).'
        required: true
        default: 'supabase/apply_to_production.sql'
      project_ref:
        description: 'Supabase project ref (subdomain). Default is LCBRising production.'
        required: true
        default: 'mvtqqlfzawyhntnsavbx'
      admin_email:
        description: 'Optional. If set, replaces the placeholder admin email in the script before applying.'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Verify required secret
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::Missing required GitHub repo secret: SUPABASE_ACCESS_TOKEN"
            echo "Add it at: https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi
          echo "SUPABASE_ACCESS_TOKEN present."

      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Resolve project ref
        id: ref
        env:
          PROJECT_REF: ${{ github.event.inputs.project_ref }}
        run: |
          set -euo pipefail
          if [ -z "$PROJECT_REF" ]; then
            echo "::error::project_ref input is empty."
            exit 1
          fi
          echo "Project ref: $PROJECT_REF"
          echo "ref=$PROJECT_REF" >> "$GITHUB_OUTPUT"

      - name: Verify token has access to this project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          REF: ${{ steps.ref.outputs.ref }}
        run: |
          set -euo pipefail
          code=$(curl -sS -o /tmp/proj.json -w "%{http_code}" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            "https://api.supabase.com/v1/projects/$REF")
          if [ "$code" != "200" ]; then
            echo "::error::Token cannot see project $REF (HTTP $code)."
            echo "Make sure the PAT belongs to the account that owns the LCBRISING organization."
            cat /tmp/proj.json
            exit 1
          fi
          name=$(jq -r '.name // empty' /tmp/proj.json)
          echo "Verified project: $name ($REF)"

      - name: Locate SQL file
        id: sql
        env:
          SQL_PATH: ${{ github.event.inputs.sql_path }}
          ADMIN_EMAIL: ${{ github.event.inputs.admin_email }}
        run: |
          set -euo pipefail
          if [ ! -f "$SQL_PATH" ]; then
            echo "::error::SQL file not found: $SQL_PATH"
            exit 1
          fi
          dst=/tmp/migration.sql
          cp "$SQL_PATH" "$dst"
          if [ -n "$ADMIN_EMAIL" ]; then
            echo "Substituting admin email: $ADMIN_EMAIL"
            sed -i "s|admin@lcbrising\\.org|$ADMIN_EMAIL|g" "$dst"
          fi
          lines=$(wc -l < "$dst")
          bytes=$(wc -c < "$dst")
          echo "SQL file: $SQL_PATH  ($lines lines, $bytes bytes)"
          echo "path=$dst" >> "$GITHUB_OUTPUT"

      - name: Apply SQL via Supabase Management API
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          REF: ${{ steps.ref.outputs.ref }}
          SQL_FILE: ${{ steps.sql.outputs.path }}
        run: |
          set -euo pipefail
          # Build a single JSON request body: { "query": "<entire file>" }
          # jq -Rs slurps the whole file into a JSON string with proper escaping.
          jq -Rs '{query: .}' "$SQL_FILE" > /tmp/body.json
          code=$(curl -sS -o /tmp/resp.json -w "%{http_code}" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            --data @/tmp/body.json \
            "https://api.supabase.com/v1/projects/$REF/database/query")

          echo "HTTP $code"
          echo "--- Response ---"
          # Pretty-print if it parses as JSON, otherwise raw.
          jq . /tmp/resp.json 2>/dev/null || cat /tmp/resp.json

          if [ "$code" != "200" ] && [ "$code" != "201" ]; then
            echo "::error::Migration failed (HTTP $code)"
            exit 1
          fi

      - name: Verify new tables exist
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          REF: ${{ steps.ref.outputs.ref }}
        run: |
          set -euo pipefail
          verify_sql=$(cat <<'SQL'
          select table_name
          from information_schema.tables
          where table_schema='public'
            and table_name in (
              'multiple_districts','districts','regions','zones',
              'officers','oauth_accounts','oauth_sessions',
              'attendance','committees','committee_members',
              'trainings','training_completions','awards',
              'sync_logs','audit_logs','integrations'
            )
          order by table_name;
          SQL
          )
          jq -n --arg q "$verify_sql" '{query:$q}' > /tmp/v.json
          curl -sSf \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            --data @/tmp/v.json \
            "https://api.supabase.com/v1/projects/$REF/database/query" \
            | jq .

      - name: Done
        run: |
          echo "Migration applied successfully to project ${{ steps.ref.outputs.ref }}."
          echo "Federation tables verified above."
