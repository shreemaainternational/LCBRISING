name: Apply dues GST fee-schedule (one-shot, auto on push)

# One-shot: applies supabase/scripts/apply_dues_gst.sql to the LCBRising
# production Supabase project via the Management API. Auto-runs when the
# SQL (or this workflow) lands on main, because the environment's GitHub
# integration cannot dispatch workflow_dispatch workflows. Idempotent —
# safe to re-run; settled invoices are never touched.
#
# Reuses the existing repo secret:
#   SUPABASE_ACCESS_TOKEN  - PAT (sbp_*) for the account that owns the
#                            LCBRISING Supabase organization.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/scripts/apply_dues_gst.sql'
      - '.github/workflows/apply-dues-gst.yml'

permissions:
  contents: read

env:
  PROJECT_REF: mvtqqlfzawyhntnsavbx
  SQL_PATH: supabase/scripts/apply_dues_gst.sql

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Verify required secret
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::Missing required GitHub repo secret: SUPABASE_ACCESS_TOKEN"
            exit 1
          fi
          echo "SUPABASE_ACCESS_TOKEN present."

      - uses: actions/checkout@v4

      - name: Verify token can see the project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          code=$(curl -sS -o /tmp/proj.json -w "%{http_code}" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            "https://api.supabase.com/v1/projects/$PROJECT_REF")
          if [ "$code" != "200" ]; then
            echo "::error::Token cannot see project $PROJECT_REF (HTTP $code)."
            cat /tmp/proj.json
            exit 1
          fi
          echo "Verified project: $(jq -r '.name // empty' /tmp/proj.json) ($PROJECT_REF)"

      - name: Apply SQL via Supabase Management API
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          if [ ! -f "$SQL_PATH" ]; then
            echo "::error::SQL file not found: $SQL_PATH"; exit 1
          fi
          jq -Rs '{query: .}' "$SQL_PATH" > /tmp/body.json
          code=$(curl -sS -o /tmp/resp.json -w "%{http_code}" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            --data @/tmp/body.json \
            "https://api.supabase.com/v1/projects/$PROJECT_REF/database/query")
          echo "HTTP $code"
          echo "--- Response (read-back summary) ---"
          jq . /tmp/resp.json 2>/dev/null || cat /tmp/resp.json
          if [ "$code" != "200" ] && [ "$code" != "201" ]; then
            echo "::error::Dues GST migration failed (HTTP $code)"; exit 1
          fi

      - name: Verify rate cards + invoice totals
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          read -r -d '' Q <<'SQL' || true
          select code, amount, currency, gst_pct
            from public.dues_rate_cards
           where code in ('DISTRICT_PER_CAPITA','LCI_PER_CAPITA')
           order by code;
          SQL
          jq -n --arg q "$Q" '{query:$q}' > /tmp/v.json
          curl -sSf \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            --data @/tmp/v.json \
            "https://api.supabase.com/v1/projects/$PROJECT_REF/database/query" | jq .

      - name: Done
        run: echo "Dues GST fee-schedule applied to $PROJECT_REF."
