name: Force production redeploy

# Triggers a fresh production build of barodarisingstar.com from the
# current state of main, with the build cache cleared so any NEXT_PUBLIC_*
# inlining and Tailwind output is regenerated from scratch.
#
# Use this when:
# - The custom domain is pinned to an older deployment
# - You changed env vars in Vercel and need a rebuild to pick them up
# - You want to verify the latest main commit is what's serving
#
# Required GitHub repo secret:
#   VERCEL_TOKEN  - Vercel personal access token. Create at:
#                   https://vercel.com/account/tokens
#                   Scope: 'shreemaainternationals-projects' team
#
# Trigger: Actions -> 'Force production redeploy' -> Run workflow -> Run.

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  TEAM_SLUG: shreemaainternationals-projects
  PROJECT_NAME: lcb-rising-star

jobs:
  redeploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Verify token
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "::error::Missing VERCEL_TOKEN secret"
            echo "Create one at https://vercel.com/account/tokens scoped to team $TEAM_SLUG"
            echo "Add it at https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi

      - uses: actions/checkout@v4
        with: { ref: main }

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Link project + force production deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          vercel pull --yes \
            --environment=production \
            --token="$VERCEL_TOKEN" \
            --scope="$TEAM_SLUG"

          # --force flag tells Vercel to rebuild even if the same SHA was
          # built before. Disables build cache reuse.
          vercel deploy --prod --force --yes \
            --token="$VERCEL_TOKEN" \
            --scope="$TEAM_SLUG" 2>&1 | tee /tmp/deploy.log

          # Extract the canonical deployment URL for the summary.
          URL=$(grep -oE 'https://[a-z0-9-]+\.vercel\.app' /tmp/deploy.log | tail -1)
          echo "::notice::✓ Fresh production deploy live: $URL"
          echo "::notice::Custom domain barodarisingstar.com points to whichever deploy is marked Production."
