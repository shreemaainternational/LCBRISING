name: Bake Supabase public defaults into env.ts

# Fetches NEXT_PUBLIC_SUPABASE_URL and NEXT_PUBLIC_SUPABASE_ANON_KEY
# from the Supabase Management API and patches them in as Zod defaults
# in src/lib/env.ts.
#
# Why: NEXT_PUBLIC_* env vars are inlined into the client JS bundle at
# BUILD time. If they aren't present in the build context (or build
# cache reused stale bundles), the browser ends up with empty values
# and Supabase Auth fetches fail with "Failed to fetch".
#
# Anon keys are designed to be public (Supabase RLS handles security),
# so committing them is safe. The service_role key is NEVER touched
# here and remains server-only.
#
# Required GitHub repo secret:
#   SUPABASE_ACCESS_TOKEN  - PAT for the LCBRising Supabase org
#                            (already configured for apply-migration).
#
# Result: opens a PR with the patched env.ts. Merge → Vercel auto-deploys.

on:
  workflow_dispatch:
    inputs:
      project_ref:
        description: 'Supabase project ref'
        required: true
        default: 'mvtqqlfzawyhntnsavbx'

permissions:
  contents: write
  pull-requests: write

jobs:
  bake:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify required secret
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::Missing SUPABASE_ACCESS_TOKEN"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: main
          # GITHUB_TOKEN is fine for branch push; PR is opened via the
          # peter-evans action which also uses GITHUB_TOKEN.

      - name: Fetch anon key from Supabase Management API
        id: keys
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          REF: ${{ github.event.inputs.project_ref }}
        run: |
          set -euo pipefail
          code=$(curl -sS -o /tmp/keys.json -w "%{http_code}" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            "https://api.supabase.com/v1/projects/$REF/api-keys")
          if [ "$code" != "200" ]; then
            echo "::error::api-keys fetch failed (HTTP $code)"
            cat /tmp/keys.json
            exit 1
          fi

          # The response is an array of {name, api_key, …}
          anon=$(jq -r '.[] | select(.name=="anon") | .api_key' /tmp/keys.json)
          if [ -z "$anon" ] || [ "$anon" = "null" ]; then
            echo "::error::Could not extract anon key"
            jq . /tmp/keys.json
            exit 1
          fi

          url="https://${REF}.supabase.co"
          echo "Resolved:"
          echo "  url=$url"
          echo "  anon=${anon:0:20}…${anon: -8}"

          # Mask the anon key in subsequent logs (defence-in-depth even
          # though anon keys are designed to be public).
          echo "::add-mask::$anon"

          {
            echo "url=$url"
            echo "anon<<EOF"
            echo "$anon"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Patch src/lib/env.ts with defaults
        env:
          URL: ${{ steps.keys.outputs.url }}
          ANON: ${{ steps.keys.outputs.anon }}
        run: |
          set -euo pipefail
          # Use python for precise regex with multiline + escaping.
          python3 <<'PY'
          import os, re, pathlib
          url = os.environ["URL"]
          anon = os.environ["ANON"]
          p = pathlib.Path("src/lib/env.ts")
          src = p.read_text()

          # Replace the two NEXT_PUBLIC_SUPABASE_* lines.
          # Match current schema with or without an existing default().
          src_new, n1 = re.subn(
              r'NEXT_PUBLIC_SUPABASE_URL:\s*z\.string\(\)\.url\(\)(?:\.default\([^)]*\))?\.optional\(\),',
              f'NEXT_PUBLIC_SUPABASE_URL: z.string().url().default({url!r}),',
              src,
          )
          src_new, n2 = re.subn(
              r'NEXT_PUBLIC_SUPABASE_ANON_KEY:\s*z\.string\(\)\.min\(20\)(?:\.default\([^)]*\))?\.optional\(\),',
              f'NEXT_PUBLIC_SUPABASE_ANON_KEY: z.string().min(20).default({anon!r}),',
              src_new,
          )
          if n1 == 0 or n2 == 0:
              raise SystemExit(f"::error::could not find env keys to patch (n1={n1}, n2={n2})")
          p.write_text(src_new)
          print(f"Patched {p}: url={n1}, anon={n2}")
          PY

          # Also patch the requireSupabaseEnv function to no longer throw
          # (defaults now always exist). It's a no-op if already non-throwing.
          # We leave the function as-is since the .default() in the schema
          # already ensures non-null.

          git --no-pager diff src/lib/env.ts || true

      - name: Sanity check (typecheck the patched file)
        run: |
          set -euo pipefail
          npm ci --prefer-offline --no-audit --no-fund > /dev/null
          npx tsc --noEmit --skipLibCheck src/lib/env.ts || {
            echo "::error::Patched env.ts fails typecheck"; exit 1;
          }

      - name: Push patched env.ts to a dedicated branch
        env:
          GH_BRANCH: claude/baked-supabase-defaults
        run: |
          set -euo pipefail
          if git diff --quiet src/lib/env.ts; then
            echo "No changes to env.ts (defaults already match). Skipping push."
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$GH_BRANCH"
          git add src/lib/env.ts
          git commit -m "fix(env): bake Supabase public URL+anon key as Zod defaults

Auto-generated by .github/workflows/bake-supabase-defaults.yml.

NEXT_PUBLIC_SUPABASE_* are inlined into the client JS bundle at build
time. If Vercel's build context lacks them, the bundle gets empty
strings and every Supabase fetch fails with 'Failed to fetch'. This
moves the values to Zod .default() so the build no longer depends on
env vars.

Anon keys are public by design (Supabase RLS gates access).
The service_role key is NOT touched."
          git push --force origin "$GH_BRANCH"
          echo "::notice::Pushed branch '$GH_BRANCH'. PR can be opened at:"
          echo "::notice::https://github.com/${{ github.repository }}/compare/main...$GH_BRANCH"
