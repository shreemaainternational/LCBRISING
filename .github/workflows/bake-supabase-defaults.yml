name: Bake Supabase public defaults into env.ts

# Fetches NEXT_PUBLIC_SUPABASE_URL and NEXT_PUBLIC_SUPABASE_ANON_KEY
# from the Supabase Management API and rewrites src/lib/env.ts so the
# URL and anon key are baked in as Zod .default(...) values.
#
# Why: NEXT_PUBLIC_* env vars are inlined into the Next.js client JS
# bundle at BUILD time. If Vercel's build context lacks them, the
# bundle ships with empty Supabase URLs and every auth fetch fails
# with "Failed to fetch". Moving the values to code-level defaults
# removes that build-time dependency entirely.
#
# Anon keys are public by design (Supabase RLS gates data access).
# The service_role key is NOT touched and stays a server-only secret.
#
# Required GitHub repo secret:
#   SUPABASE_ACCESS_TOKEN  - PAT for the LCBRising Supabase org.
#
# Result: pushes a branch 'claude/baked-supabase-defaults' that you
# (or Claude via MCP) can open into a PR.

on:
  workflow_dispatch:
    inputs:
      project_ref:
        description: 'Supabase project ref'
        required: true
        default: 'mvtqqlfzawyhntnsavbx'

permissions:
  contents: write

jobs:
  bake:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify token
        run: |
          if [ -z "${{ secrets.SUPABASE_ACCESS_TOKEN }}" ]; then
            echo "::error::Missing SUPABASE_ACCESS_TOKEN secret"
            exit 1
          fi
          echo "OK"

      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Fetch anon key + URL from Supabase Management API
        id: keys
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          REF: ${{ github.event.inputs.project_ref }}
        run: |
          set -euo pipefail

          code=$(curl -sS -o /tmp/keys.json -w '%{http_code}' \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            "https://api.supabase.com/v1/projects/$REF/api-keys")

          echo "HTTP $code"
          if [ "$code" != "200" ]; then
            echo "::error::Supabase api-keys returned $code"
            cat /tmp/keys.json
            exit 1
          fi

          # Response is a JSON array of {name, api_key, ...}
          ANON=$(jq -r '.[] | select(.name=="anon") | .api_key' /tmp/keys.json)
          if [ -z "$ANON" ] || [ "$ANON" = "null" ]; then
            echo "::error::Could not extract anon key from response"
            cat /tmp/keys.json
            exit 1
          fi

          URL="https://${REF}.supabase.co"
          echo "url=$URL"
          echo "anon prefix=${ANON:0:14}…"

          # Mask to keep it out of subsequent logs.
          echo "::add-mask::$ANON"

          # Hand off to the next step.
          printf 'url=%s\n' "$URL" >> "$GITHUB_OUTPUT"
          {
            echo 'anon<<EOF'
            printf '%s\n' "$ANON"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Patch src/lib/env.ts via Node script
        env:
          URL: ${{ steps.keys.outputs.url }}
          ANON: ${{ steps.keys.outputs.anon }}
        run: |
          set -euo pipefail

          # Inline Node script — no external deps, no heredoc fragility.
          node <<'NODE'
          const fs = require('node:fs');
          const path = 'src/lib/env.ts';
          const url = process.env.URL;
          const anon = process.env.ANON;
          if (!url || !anon) {
            console.error('URL or ANON not set');
            process.exit(1);
          }

          let src = fs.readFileSync(path, 'utf8');
          const before = src;

          // The two lines we replace. We accept any combination of
          // .optional() / .default(...) / nothing after the validators.
          const urlPattern = /NEXT_PUBLIC_SUPABASE_URL:\s*z\.string\(\)\.url\(\)(?:\.[^,]+)*,/;
          const anonPattern = /NEXT_PUBLIC_SUPABASE_ANON_KEY:\s*z\.string\(\)\.min\(20\)(?:\.[^,]+)*,/;

          const urlReplacement = `NEXT_PUBLIC_SUPABASE_URL: z.string().url().default(${JSON.stringify(url)}),`;
          const anonReplacement = `NEXT_PUBLIC_SUPABASE_ANON_KEY: z.string().min(20).default(${JSON.stringify(anon)}),`;

          if (!urlPattern.test(src)) {
            console.error('Could not find NEXT_PUBLIC_SUPABASE_URL pattern');
            process.exit(1);
          }
          if (!anonPattern.test(src)) {
            console.error('Could not find NEXT_PUBLIC_SUPABASE_ANON_KEY pattern');
            process.exit(1);
          }

          src = src.replace(urlPattern, urlReplacement);
          src = src.replace(anonPattern, anonReplacement);

          if (src === before) {
            console.error('No change after replace — should not happen');
            process.exit(1);
          }

          fs.writeFileSync(path, src, 'utf8');
          console.log('Patched env.ts successfully.');
          NODE

          echo '--- diff ---'
          git --no-pager diff src/lib/env.ts | head -40 || true

      - name: Push patched branch
        env:
          GH_BRANCH: claude/baked-supabase-defaults
        run: |
          set -euo pipefail

          if git diff --quiet src/lib/env.ts; then
            echo "::notice::No changes to env.ts; defaults already current. Nothing to push."
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$GH_BRANCH"
          git add src/lib/env.ts
          git commit -m "fix(env): bake Supabase public URL+anon key as Zod defaults"
          git push --force origin "$GH_BRANCH"

          echo "::notice::Pushed $GH_BRANCH. Compare URL:"
          echo "::notice::https://github.com/${{ github.repository }}/compare/main...$GH_BRANCH"
