name: Apply TB Kit Distribution activity (one-shot)

# Push-triggered one-shot: inserts the TB Kit Distribution activity directly
# into the LCBRising production database via the Supabase REST API (PostgREST)
# using the repo secret SUPABASE_SERVICE_ROLE_KEY (bypasses RLS). The public
# Recent Activities section and the CRM both read public.activities, so this
# one row serves both. Idempotent: it checks for an existing row first.

on:
  push:
    branches: [claude/apply-tbkit]

permissions:
  contents: read

jobs:
  insert:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUPABASE_URL: https://mvtqqlfzawyhntnsavbx.supabase.co
    steps:
      - name: Verify required secret
        env:
          KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$KEY" ]; then
            echo "::error::Missing required GitHub repo secret: SUPABASE_SERVICE_ROLE_KEY"
            echo "Add it at: https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi
          echo "SUPABASE_SERVICE_ROLE_KEY present."

      - name: Insert activity if not already present
        env:
          KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          API="$SUPABASE_URL/rest/v1"
          AUTH=(-H "apikey: $KEY" -H "Authorization: Bearer $KEY")

          echo "Checking for an existing TB Kit Distribution row..."
          existing=$(curl -sS "${AUTH[@]}" \
            "$API/activities?select=id&title=eq.TB%20Kit%20Distribution&date=eq.2024-12-26")
          echo "existing = $existing"
          if [ "$existing" != "[]" ] && [ -n "$existing" ]; then
            echo "Already present — nothing to do (idempotent)."
            exit 0
          fi

          echo "Resolving home club id (optional)..."
          club=$(curl -sS "${AUTH[@]}" \
            "$API/clubs?select=id&name=eq.Lions%20Club%20of%20Baroda%20Rising%20Star" \
            | jq -r 'if type=="array" and length>0 then .[0].id else empty end' || true)
          echo "club id = ${club:-<none>}"

          desc='Distribution of TB nutrition support kits to patients at the Urban Health Center, Warasiya, Vadodara. Held 09:30 AM – 11:30 AM with 16 Lions volunteers contributing 32 service hours (16 × 2). 620 beneficiaries reached. Expenditure ₹5,500.'

          # Build the row. Include club_id only when resolved.
          jq -n \
            --arg title 'TB Kit Distribution' \
            --arg desc "$desc" \
            --arg date '2024-12-26' \
            --arg loc 'Urban Health Center, Warasiya, Vadodara' \
            --arg club "$club" \
            '{
               title: $title,
               description: $desc,
               category: "healthcare",
               beneficiaries: 620,
               service_hours: 32,
               volunteer_hours_total: 32,
               lion_members_count: 16,
               amount_raised: 0,
               budget: 5500,
               expenses: 5500,
               date: $date,
               location: $loc,
               is_medical_camp: true,
               status: "completed",
               reported_to_district: false
             }
             + (if $club == "" then {} else {club_id: $club} end)' > /tmp/row.json

          echo "Posting row..."
          code=$(curl -sS -o /tmp/resp.json -w "%{http_code}" -X POST "${AUTH[@]}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=representation" \
            --data @/tmp/row.json \
            "$API/activities")
          echo "HTTP $code"
          echo "--- Response ---"
          jq . /tmp/resp.json 2>/dev/null || cat /tmp/resp.json
          if [ "$code" != "200" ] && [ "$code" != "201" ]; then
            echo "::error::Insert failed (HTTP $code)"
            exit 1
          fi
          echo "TB Kit Distribution activity inserted into production."

      - name: Verify it is now present
        env:
          KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          curl -sS -H "apikey: $KEY" -H "Authorization: Bearer $KEY" \
            "$SUPABASE_URL/rest/v1/activities?select=title,date,beneficiaries,lion_members_count,service_hours,expenses,location,status&title=eq.TB%20Kit%20Distribution" \
            | jq .
