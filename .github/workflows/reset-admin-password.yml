name: Reset admin password via Supabase Auth Admin API

# Creates or resets the admin user using the official Supabase Auth
# Admin REST endpoint. Bulletproof — same code path GoTrue uses
# internally, so password hash + identity rows + email confirmation
# all match what the auth service expects when validating logins.
#
# Required GitHub repo secret:
#   SUPABASE_ACCESS_TOKEN  - PAT (sbp_*) for the LCBRising Supabase org.

on:
  workflow_dispatch:
    inputs:
      project_ref:
        description: 'Supabase project ref'
        required: true
        default: 'mvtqqlfzawyhntnsavbx'
      email:
        description: 'Email of the admin user to create/reset'
        required: true
        default: 'crm-admin@lcbrising.org'
      password:
        description: 'Password to set (CHANGE THIS AFTER FIRST LOGIN)'
        required: true
        default: 'Lions3232F1@2026'

permissions:
  contents: read

jobs:
  reset:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify token
        run: |
          if [ -z "${{ secrets.SUPABASE_ACCESS_TOKEN }}" ]; then
            echo "::error::Missing SUPABASE_ACCESS_TOKEN secret"
            exit 1
          fi

      - name: Fetch service_role key from Management API
        id: keys
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          REF: ${{ github.event.inputs.project_ref }}
        run: |
          set -euo pipefail
          code=$(curl -sS -o /tmp/keys.json -w '%{http_code}' \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            "https://api.supabase.com/v1/projects/$REF/api-keys")
          if [ "$code" != "200" ]; then
            echo "::error::api-keys returned $code"; cat /tmp/keys.json; exit 1
          fi
          SVC=$(jq -r '.[] | select(.name=="service_role") | .api_key' /tmp/keys.json)
          if [ -z "$SVC" ] || [ "$SVC" = "null" ]; then
            echo "::error::Could not extract service_role key"; exit 1
          fi
          echo "service_role prefix=${SVC:0:14}…"
          echo "::add-mask::$SVC"
          {
            echo 'service_role<<EOF'
            printf '%s\n' "$SVC"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create-or-reset user via Auth Admin API
        env:
          SVC: ${{ steps.keys.outputs.service_role }}
          REF: ${{ github.event.inputs.project_ref }}
          EMAIL: ${{ github.event.inputs.email }}
          PASS: ${{ github.event.inputs.password }}
        run: |
          set -euo pipefail

          BASE="https://$REF.supabase.co/auth/v1/admin"

          # Step 1: try to CREATE the user. If they already exist GoTrue
          # responds with 422 "User already registered".
          CREATE_BODY=$(jq -nc --arg e "$EMAIL" --arg p "$PASS" \
            '{email:$e, password:$p, email_confirm:true, user_metadata:{name:"CRM Admin"}}')

          echo "POST $BASE/users (create attempt)"
          CODE=$(curl -sS -o /tmp/create.json -w '%{http_code}' \
            -X POST \
            -H "Authorization: Bearer $SVC" \
            -H "apikey: $SVC" \
            -H "Content-Type: application/json" \
            --data "$CREATE_BODY" \
            "$BASE/users")
          echo "HTTP $CODE"

          if [ "$CODE" = "200" ] || [ "$CODE" = "201" ]; then
            UID=$(jq -r '.id // .user.id // empty' /tmp/create.json)
            echo "Created user uid=$UID"
            echo "UID=$UID" >> "$GITHUB_ENV"
            exit 0
          fi

          # Step 2: if it's a conflict, find the existing user and UPDATE.
          echo '----- create response -----'
          cat /tmp/create.json
          echo
          echo '---------------------------'

          if [ "$CODE" != "422" ] && [ "$CODE" != "409" ]; then
            echo "::error::Unexpected create response ($CODE) — not a conflict"
            exit 1
          fi

          echo "User exists — listing all users to find UID by email (shape-tolerant)…"
          curl -sS -o /tmp/users.json \
            -H "Authorization: Bearer $SVC" \
            -H "apikey: $SVC" \
            "$BASE/users?per_page=1000"

          # Use Node so we handle either {users:[]} or [...] shape.
          UID=$(node -e '
            const fs = require("fs");
            const raw = fs.readFileSync("/tmp/users.json","utf8");
            let data;
            try { data = JSON.parse(raw); } catch (e) {
              console.error("not JSON:", raw.slice(0, 300));
              process.exit(2);
            }
            const arr = Array.isArray(data) ? data
              : (Array.isArray(data.users) ? data.users : []);
            const u = arr.find(x => (x.email || "").toLowerCase() === process.env.EMAIL.toLowerCase());
            if (!u) {
              console.error("no user matched email=" + process.env.EMAIL);
              console.error("count=" + arr.length);
              process.exit(3);
            }
            process.stdout.write(u.id);
          ')

          if [ -z "$UID" ]; then
            echo "::error::Could not resolve user id"
            exit 1
          fi
          echo "Found existing uid=$UID"

          UPDATE_BODY=$(jq -nc --arg p "$PASS" \
            '{password:$p, email_confirm:true, user_metadata:{name:"CRM Admin"}}')
          echo "PUT $BASE/users/$UID (password reset + email_confirm)"
          PUT_CODE=$(curl -sS -o /tmp/upd.json -w '%{http_code}' \
            -X PUT \
            -H "Authorization: Bearer $SVC" \
            -H "apikey: $SVC" \
            -H "Content-Type: application/json" \
            --data "$UPDATE_BODY" \
            "$BASE/users/$UID")
          echo "HTTP $PUT_CODE"
          cat /tmp/upd.json
          if [ "$PUT_CODE" != "200" ]; then
            echo "::error::PUT update failed"
            exit 1
          fi
          echo "UID=$UID" >> "$GITHUB_ENV"

      - name: Promote member row to international_admin
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          REF: ${{ github.event.inputs.project_ref }}
          EMAIL: ${{ github.event.inputs.email }}
        run: |
          set -euo pipefail
          # Build the SQL with proper escaping via Node, then POST as JSON.
          node -e '
            const fs = require("fs");
            const email = process.env.EMAIL.replace(/'\''/g, "'\'''\''");
            const sql = `insert into public.members (user_id, name, email, role, lions_role, status, joined_at)
              select u.id, '\''CRM Admin'\'', '\''${email}'\'', '\''admin'\'', '\''international_admin'\'', '\''active'\'', current_date
              from auth.users u where u.email = '\''${email}'\''
              on conflict (email) do update set
                user_id = excluded.user_id,
                role = '\''admin'\'',
                lions_role = '\''international_admin'\'',
                status = '\''active'\'',
                updated_at = now();`;
            fs.writeFileSync("/tmp/promote.json", JSON.stringify({query: sql}));
          '

          code=$(curl -sS -o /tmp/promote-out.json -w '%{http_code}' \
            -X POST \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            --data @/tmp/promote.json \
            "https://api.supabase.com/v1/projects/$REF/database/query")
          echo "HTTP $code"
          jq . /tmp/promote-out.json || cat /tmp/promote-out.json
          if [ "$code" != "200" ] && [ "$code" != "201" ]; then
            echo "::error::Member upsert failed ($code)"
            exit 1
          fi

      - name: Done
        run: |
          echo "::notice::✓ Admin user is ready to log in"
          echo "::notice::  URL:      https://barodarisingstar.com/login"
          echo "::notice::  Email:    ${{ github.event.inputs.email }}"
          echo "::notice::  Password: (the one you entered as input)"
          echo "::notice::"
          echo "::notice::Change password after first login via:"
          echo "::notice::  Supabase Dashboard -> Authentication -> Users -> ⋯ -> Reset password"
