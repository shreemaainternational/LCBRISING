name: Reset admin password via Supabase Auth Admin API

# Creates or resets the admin user using the official Supabase Auth
# Admin REST endpoint. This is bulletproof — same code path Supabase
# uses internally, so password hash, identity rows, and email
# confirmation are guaranteed to match what the auth service expects
# when it validates a login.
#
# Previous attempts via direct INSERT into auth.users produced
# "Invalid login credentials" because the bcrypt format / identity
# row didn't exactly match what GoTrue (Supabase Auth) expects.
#
# Required GitHub repo secret:
#   SUPABASE_ACCESS_TOKEN  - PAT (sbp_*) for the LCBRising Supabase org.

on:
  workflow_dispatch:
    inputs:
      project_ref:
        description: 'Supabase project ref'
        required: true
        default: 'mvtqqlfzawyhntnsavbx'
      email:
        description: 'Email of the admin user to create/reset'
        required: true
        default: 'crm-admin@lcbrising.org'
      password:
        description: 'Password to set (CHANGE THIS AFTER FIRST LOGIN)'
        required: true
        default: 'Lions3232F1@2026'

permissions:
  contents: read

jobs:
  reset:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify token
        run: |
          if [ -z "${{ secrets.SUPABASE_ACCESS_TOKEN }}" ]; then
            echo "::error::Missing SUPABASE_ACCESS_TOKEN secret"
            exit 1
          fi

      - name: Fetch service_role key from Management API
        id: keys
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          REF: ${{ github.event.inputs.project_ref }}
        run: |
          set -euo pipefail
          code=$(curl -sS -o /tmp/keys.json -w '%{http_code}' \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            "https://api.supabase.com/v1/projects/$REF/api-keys")
          if [ "$code" != "200" ]; then
            echo "::error::api-keys returned $code"; cat /tmp/keys.json; exit 1
          fi
          SVC=$(jq -r '.[] | select(.name=="service_role") | .api_key' /tmp/keys.json)
          if [ -z "$SVC" ] || [ "$SVC" = "null" ]; then
            echo "::error::Could not extract service_role key"; exit 1
          fi
          echo "service_role prefix=${SVC:0:14}…"
          echo "::add-mask::$SVC"
          {
            echo 'service_role<<EOF'
            printf '%s\n' "$SVC"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Look up existing user by email
        id: lookup
        env:
          SVC: ${{ steps.keys.outputs.service_role }}
          REF: ${{ github.event.inputs.project_ref }}
          EMAIL: ${{ github.event.inputs.email }}
        run: |
          set -euo pipefail
          # Auth Admin: list users filtered by email.
          # GoTrue's list endpoint paginates and supports ?email= filter.
          code=$(curl -sS -o /tmp/users.json -w '%{http_code}' \
            -H "Authorization: Bearer $SVC" \
            -H "apikey: $SVC" \
            "https://$REF.supabase.co/auth/v1/admin/users?email=$EMAIL")
          if [ "$code" != "200" ]; then
            echo "::error::auth list returned $code"; cat /tmp/users.json; exit 1
          fi
          # The response shape is { users: [...] } on GoTrue.
          uid=$(jq -r --arg e "$EMAIL" '.users[] | select(.email==$e) | .id' /tmp/users.json | head -1)
          if [ -z "$uid" ]; then
            uid="$(jq -r --arg e "$EMAIL" '.[]? | select(.email==$e) | .id' /tmp/users.json | head -1)"
          fi
          echo "uid=${uid:-<none>}"
          echo "uid=$uid" >> "$GITHUB_OUTPUT"

      - name: Reset password (if user exists) or create
        env:
          SVC: ${{ steps.keys.outputs.service_role }}
          REF: ${{ github.event.inputs.project_ref }}
          EMAIL: ${{ github.event.inputs.email }}
          PASS: ${{ github.event.inputs.password }}
          UID: ${{ steps.lookup.outputs.uid }}
        run: |
          set -euo pipefail
          if [ -n "$UID" ]; then
            echo "Updating existing user $UID — resetting password and confirming email."
            payload=$(jq -nc --arg p "$PASS" \
              '{password:$p, email_confirm:true, user_metadata:{name:"CRM Admin"}}')
            code=$(curl -sS -o /tmp/upd.json -w '%{http_code}' \
              -X PUT \
              -H "Authorization: Bearer $SVC" \
              -H "apikey: $SVC" \
              -H "Content-Type: application/json" \
              --data "$payload" \
              "https://$REF.supabase.co/auth/v1/admin/users/$UID")
            echo "HTTP $code"
            jq . /tmp/upd.json || cat /tmp/upd.json
            if [ "$code" != "200" ]; then
              echo "::error::Update failed ($code)"; exit 1
            fi
          else
            echo "Creating new user $EMAIL"
            payload=$(jq -nc --arg e "$EMAIL" --arg p "$PASS" \
              '{email:$e, password:$p, email_confirm:true, user_metadata:{name:"CRM Admin"}}')
            code=$(curl -sS -o /tmp/cre.json -w '%{http_code}' \
              -X POST \
              -H "Authorization: Bearer $SVC" \
              -H "apikey: $SVC" \
              -H "Content-Type: application/json" \
              --data "$payload" \
              "https://$REF.supabase.co/auth/v1/admin/users")
            echo "HTTP $code"
            jq . /tmp/cre.json || cat /tmp/cre.json
            if [ "$code" != "200" ] && [ "$code" != "201" ] && [ "$code" != "422" ]; then
              echo "::error::Create failed ($code)"; exit 1
            fi
            # If 422 (likely already exists race), try one more lookup + update.
            if [ "$code" = "422" ]; then
              echo "User race-existed; looking up and retrying as update."
              uid2=$(curl -sS \
                -H "Authorization: Bearer $SVC" \
                -H "apikey: $SVC" \
                "https://$REF.supabase.co/auth/v1/admin/users?email=$EMAIL" \
                | jq -r --arg e "$EMAIL" '(.users[]? // .[]?) | select(.email==$e) | .id' | head -1)
              if [ -z "$uid2" ]; then
                echo "::error::Race retry: still no uid"; exit 1
              fi
              payload=$(jq -nc --arg p "$PASS" \
                '{password:$p, email_confirm:true, user_metadata:{name:"CRM Admin"}}')
              code2=$(curl -sS -o /tmp/upd2.json -w '%{http_code}' \
                -X PUT \
                -H "Authorization: Bearer $SVC" \
                -H "apikey: $SVC" \
                -H "Content-Type: application/json" \
                --data "$payload" \
                "https://$REF.supabase.co/auth/v1/admin/users/$uid2")
              echo "HTTP $code2"; jq . /tmp/upd2.json || cat /tmp/upd2.json
              [ "$code2" = "200" ] || { echo "::error::Race update failed"; exit 1; }
            fi
          fi
          echo "::notice::Admin user ready. Sign in at https://barodarisingstar.com/login"

      - name: Promote member row to international_admin
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          REF: ${{ github.event.inputs.project_ref }}
          EMAIL: ${{ github.event.inputs.email }}
        run: |
          set -euo pipefail
          # Use Management API SQL endpoint for the public.members upsert.
          # (Auth Admin API only manages auth.users, not our app's members table.)
          query=$(jq -nc --arg e "$EMAIL" '{query:
            "insert into public.members (user_id, name, email, role, lions_role, status, joined_at) " &
            "select u.id, ''CRM Admin'', \($e | @json), ''admin'', ''international_admin'', ''active'', current_date " &
            "from auth.users u where u.email = \($e | @json) " &
            "on conflict (email) do update set user_id = excluded.user_id, role = ''admin'', " &
            "lions_role = ''international_admin'', status = ''active'', updated_at = now();"}')
          # The above jq trick is brittle; build via a simpler Node script.
          node <<'NODE'
          const email = process.env.EMAIL;
          const sql = `insert into public.members (user_id, name, email, role, lions_role, status, joined_at)
            select u.id, 'CRM Admin', '${email.replace(/'/g, "''")}', 'admin', 'international_admin', 'active', current_date
            from auth.users u where u.email = '${email.replace(/'/g, "''")}'
            on conflict (email) do update set user_id = excluded.user_id, role = 'admin',
            lions_role = 'international_admin', status = 'active', updated_at = now();`;
          require('fs').writeFileSync('/tmp/promote.json', JSON.stringify({query: sql}));
          NODE

          code=$(curl -sS -o /tmp/promote-out.json -w '%{http_code}' \
            -X POST \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            --data @/tmp/promote.json \
            "https://api.supabase.com/v1/projects/$REF/database/query")
          echo "HTTP $code"
          jq . /tmp/promote-out.json || cat /tmp/promote-out.json
          if [ "$code" != "200" ] && [ "$code" != "201" ]; then
            echo "::error::Member upsert failed ($code)"
            exit 1
          fi
          echo "::notice::Member row promoted to international_admin."

      - name: Done
        run: |
          echo "::notice::✓ Admin user ready to log in"
          echo "::notice::  URL:      https://barodarisingstar.com/login"
          echo "::notice::  Email:    ${{ github.event.inputs.email }}"
          echo "::notice::  Password: (the one you entered as input)"
          echo "::notice::"
          echo "::notice::Change password after first login via:"
          echo "::notice::  Supabase Dashboard -> Authentication -> Users -> ⋯ -> Reset password"
