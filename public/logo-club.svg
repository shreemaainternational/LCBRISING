<svg xmlns="http://www.w3.org/2000/svg" width="196" height="196" viewBox="0 0 196 196" role="img" aria-label="Lions Club of Baroda Rising Star club emblem">
  <g transform="translate(98,98)">
    <g aria-label="Lions Club of Baroda Rising Star club emblem">
      <defs>
        <radialGradient id="clubStandalone-disc" cx="38%" cy="30%" r="80%">
          <stop offset="0%" stop-color="#a23344"/>
          <stop offset="65%" stop-color="#7a1f2b"/>
          <stop offset="100%" stop-color="#54141d"/>
        </radialGradient>
        <linearGradient id="clubStandalone-star" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#ffe49a"/>
          <stop offset="100%" stop-color="#c9971f"/>
        </linearGradient>
        <path id="clubStandalone-ring-top" d="M -76,0 A 76,76 0 0 1 76,0" fill="none"/>
        <path id="clubStandalone-ring-bot" d="M -76,6 A 76,76 0 0 0 76,6" fill="none"/>
      </defs>
      <circle r="92" fill="url(#clubStandalone-disc)" stroke="#ffce4a" stroke-width="3"/>
      <circle r="78" fill="none" stroke="#ffce4a" stroke-width="2"/>
      <text font-family="Georgia, 'Times New Roman', serif" font-weight="bold" fill="#ffce4a" font-size="14" letter-spacing="1.5">
        <textPath href="#clubStandalone-ring-top" startOffset="50%" text-anchor="middle">BARODA RISING STAR</textPath>
      </text>
      <text font-family="Georgia, 'Times New Roman', serif" font-weight="bold" fill="#ffce4a" font-size="12" letter-spacing="1.5">
        <textPath href="#clubStandalone-ring-bot" startOffset="50%" text-anchor="middle">DISTRICT 3232 F1</textPath>
      </text>
      <!-- rising sun rays -->
      <g stroke="#ffce4a" stroke-width="2" stroke-linecap="round" opacity="0.85">
        <line x1="-34" y1="34" x2="-44" y2="44"/>
        <line x1="-18" y1="40" x2="-23" y2="52"/>
        <line x1="0" y1="42" x2="0" y2="55"/>
        <line x1="18" y1="40" x2="23" y2="52"/>
        <line x1="34" y1="34" x2="44" y2="44"/>
      </g>
      <path d="M -40,34 A 40,40 0 0 1 40,34 Z" fill="none" stroke="#ffce4a" stroke-width="2"/>
      <!-- rising star -->
      <polygon points="0.0,-34.0 6.5,-16.9 24.7,-16.0 10.5,-4.6 15.3,13.0 0.0,3.0 -15.3,13.0 -10.5,-4.6 -24.7,-16.0 -6.5,-16.9" fill="url(#clubStandalone-star)" stroke="#ffe49a" stroke-width="1"/>
    </g>
  </g>
</svg>
