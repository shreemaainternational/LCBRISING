<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="240" viewBox="0 0 1200 240" role="img" aria-label="Lions Club of Baroda Rising Star letterhead">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e4aa8"/>
      <stop offset="100%" stop-color="#062a66"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="18%" r="70%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="240" fill="url(#bg)"/>
  <rect width="1200" height="240" fill="url(#glow)"/>

  <!-- gold frame -->
  <rect x="6" y="6" width="1188" height="228" fill="none" stroke="#ffd24d" stroke-width="2.5"/>
  <rect x="12" y="12" width="1176" height="216" fill="none" stroke="#ffd24d" stroke-width="1" opacity="0.55"/>

  <!-- emblems -->
  <g transform="translate(112,108) scale(0.82)">
    <g aria-label="Lions Club International emblem">
      <defs>
        <radialGradient id="lions-disc" cx="38%" cy="32%" r="75%">
          <stop offset="0%" stop-color="#ffe49a"/>
          <stop offset="60%" stop-color="#ffce4a"/>
          <stop offset="100%" stop-color="#c9971f"/>
        </radialGradient>
        <path id="lions-ring-top" d="M -76,0 A 76,76 0 0 1 76,0" fill="none"/>
        <path id="lions-ring-bot" d="M -76,6 A 76,76 0 0 0 76,6" fill="none"/>
      </defs>
      <circle r="92" fill="url(#lions-disc)" stroke="#0a3d91" stroke-width="3"/>
      <circle r="78" fill="none" stroke="#0a3d91" stroke-width="2"/>
      <circle r="52" fill="#0a3d91"/>
      <text font-family="Georgia, 'Times New Roman', serif" font-weight="bold" fill="#0a3d91" font-size="17" letter-spacing="3">
        <textPath href="#lions-ring-top" startOffset="50%" text-anchor="middle">LIONS</textPath>
      </text>
      <text font-family="Georgia, 'Times New Roman', serif" font-weight="bold" fill="#0a3d91" font-size="11.5" letter-spacing="2">
        <textPath href="#lions-ring-bot" startOffset="50%" text-anchor="middle">INTERNATIONAL</textPath>
      </text>
      <!-- twin lion heads facing outward, flanking the central L -->
      <g fill="#ffce4a" stroke="#ffe49a" stroke-width="0.8">
        <path d="M -30,-8 q -10,-9 -19,-3 q 6,-4 13,-2 q -8,-5 -16,-1 q 7,-6 17,-2 q 5,1 8,5 q 4,6 1,13 q -3,6 -9,6 q -7,0 -9,-7 q -1,-5 2,-9 q 4,-4 9,-3 z"/>
        <path d="M 30,-8 q 10,-9 19,-3 q -6,-4 -13,-2 q 8,-5 16,-1 q -7,-6 -17,-2 q -5,1 -8,5 q -4,6 -1,13 q 3,6 9,6 q 7,0 9,-7 q 1,-5 -2,-9 q -4,-4 -9,-3 z"/>
      </g>
      <text x="0" y="13" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="bold" font-size="40" fill="#ffce4a">L</text>
    </g>
  </g>
  <g transform="translate(1088,108) scale(0.82)">
    <g aria-label="Lions Club of Baroda Rising Star club emblem">
      <defs>
        <radialGradient id="club-disc" cx="38%" cy="30%" r="80%">
          <stop offset="0%" stop-color="#a23344"/>
          <stop offset="65%" stop-color="#7a1f2b"/>
          <stop offset="100%" stop-color="#54141d"/>
        </radialGradient>
        <linearGradient id="club-star" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#ffe49a"/>
          <stop offset="100%" stop-color="#c9971f"/>
        </linearGradient>
        <path id="club-ring-top" d="M -76,0 A 76,76 0 0 1 76,0" fill="none"/>
        <path id="club-ring-bot" d="M -76,6 A 76,76 0 0 0 76,6" fill="none"/>
      </defs>
      <circle r="92" fill="url(#club-disc)" stroke="#ffce4a" stroke-width="3"/>
      <circle r="78" fill="none" stroke="#ffce4a" stroke-width="2"/>
      <text font-family="Georgia, 'Times New Roman', serif" font-weight="bold" fill="#ffce4a" font-size="14" letter-spacing="1.5">
        <textPath href="#club-ring-top" startOffset="50%" text-anchor="middle">BARODA RISING STAR</textPath>
      </text>
      <text font-family="Georgia, 'Times New Roman', serif" font-weight="bold" fill="#ffce4a" font-size="12" letter-spacing="1.5">
        <textPath href="#club-ring-bot" startOffset="50%" text-anchor="middle">DISTRICT 3232 F1</textPath>
      </text>
      <!-- rising sun rays -->
      <g stroke="#ffce4a" stroke-width="2" stroke-linecap="round" opacity="0.85">
        <line x1="-34" y1="34" x2="-44" y2="44"/>
        <line x1="-18" y1="40" x2="-23" y2="52"/>
        <line x1="0" y1="42" x2="0" y2="55"/>
        <line x1="18" y1="40" x2="23" y2="52"/>
        <line x1="34" y1="34" x2="44" y2="44"/>
      </g>
      <path d="M -40,34 A 40,40 0 0 1 40,34 Z" fill="none" stroke="#ffce4a" stroke-width="2"/>
      <!-- rising star -->
      <polygon points="0.0,-34.0 6.5,-16.9 24.7,-16.0 10.5,-4.6 15.3,13.0 0.0,3.0 -15.3,13.0 -10.5,-4.6 -24.7,-16.0 -6.5,-16.9" fill="url(#club-star)" stroke="#ffe49a" stroke-width="1"/>
    </g>
  </g>

  <!-- club name -->
  <text x="600" y="62" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="bold" fill="#ffffff" letter-spacing="1">LIONS CLUB OF BARODA RISING STAR</text>

  <!-- divider with star accent -->
  <line x1="320" y1="80" x2="880" y2="80" stroke="#ffd24d" stroke-width="1.4" opacity="0.65"/>
  <polygon points="600.0,71.0 602.4,76.8 608.6,77.2 603.8,81.2 605.3,87.3 600.0,84.0 594.7,87.3 596.2,81.2 591.4,77.2 597.6,76.8" fill="#ffd24d" stroke="#ffd24d" stroke-width="1"/>

  <text x="600" y="108" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#ffd24d" letter-spacing="0.5">Club No:- 179323  •  District 3232 F1  •  Region:- 6  •  Zone:- 1</text>
  <text x="600" y="134" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#ffe49a" letter-spacing="1">Lions Year 2025 - 2026</text>

  <!-- office bearers divider -->
  <line x1="250" y1="160" x2="950" y2="160" stroke="#ffd24d" stroke-width="1" opacity="0.4"/>

  <text x="250" y="206" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" letter-spacing="0.5" fill="#ffd24d">Treasurer</text>
  <text x="250" y="227" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="bold" fill="#ffffff">LN Tarun Bhatt</text>
  <line x1="198" y1="232" x2="302" y2="232" stroke="#ffd24d" stroke-width="1.2" opacity="0.7"/>
  <text x="600" y="206" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" letter-spacing="0.5" fill="#ffd24d">Club President</text>
  <text x="600" y="227" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="bold" fill="#ffffff">LN Hiren Rathod</text>
  <line x1="548" y1="232" x2="652" y2="232" stroke="#ffd24d" stroke-width="1.2" opacity="0.7"/>
  <text x="950" y="206" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" letter-spacing="0.5" fill="#ffd24d">Secretary</text>
  <text x="950" y="227" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="bold" fill="#ffffff">LN Paresh Sharma</text>
  <line x1="898" y1="232" x2="1002" y2="232" stroke="#ffd24d" stroke-width="1.2" opacity="0.7"/>
</svg>
