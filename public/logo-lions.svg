<svg xmlns="http://www.w3.org/2000/svg" width="196" height="196" viewBox="0 0 196 196" role="img" aria-label="Lions Club International emblem">
  <g transform="translate(98,98)">
    <g aria-label="Lions Club International emblem">
      <defs>
        <radialGradient id="lionsStandalone-disc" cx="38%" cy="32%" r="75%">
          <stop offset="0%" stop-color="#ffe49a"/>
          <stop offset="60%" stop-color="#ffce4a"/>
          <stop offset="100%" stop-color="#c9971f"/>
        </radialGradient>
        <path id="lionsStandalone-ring-top" d="M -76,0 A 76,76 0 0 1 76,0" fill="none"/>
        <path id="lionsStandalone-ring-bot" d="M -76,6 A 76,76 0 0 0 76,6" fill="none"/>
